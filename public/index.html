<!DOCTYPE html>
<html>
<head>
<title>Eetaram</title>
<style>
body{font-family:Arial;background:#f2f2f2}
h1{color:red}
.card{background:white;padding:20px;margin:20px;border-radius:10px}
</style>
</head>
<body>
<h1>Eetaram News</h1>
<div id="news"></div>

<script>
fetch('/api/news')
.then(res=>res.json())
.then(data=>{
  const el=document.getElementById('news');
  data.articles.forEach(a=>{
    el.innerHTML+=`<div class="card"><h3>${a.title}</h3><p>${a.desc}</p></div>`;
  });
});
</script>
</body>
</html>
